# eva24 — kitty terminal theme
# based on a system-eva24 theme for obsidian
# osidian theme by fyrr — ported to kitty color format
#
# to use: copy this file to ~/.config/kitty/themes/eva24.conf
# then add this line to your kitty.conf:
#   include ~/.config/kitty/themes/eva24.conf
# or run: kitty +kitten themes --reload-in=all


# -----------------------------------------------
# palette origin
# -----------------------------------------------
# base (background):  #1a1a1a   — near-black
# text (foreground):  #ffffff   — pure white
# love:               #eb6f92   — love              (red/pink)
# gold:               #f6c177   — rosé pine gold   (yellow/orange)
# rose:               #ebbcba   — rosé pine rose   (soft red)
# pine:               #31748f   — rosé pine pine   (teal/blue)
# foam:               #9ccfd8   — rosé pine foam   (cyan/green)
# iris:               #c4a7e7   — rosé pine iris   (purple)
# muted:              #6e6a86
# subtle:             #908caa
# overlay:            #222222
# accent/links:       #b487d5   — eva01 (purple)
# title color:        #81bbeb   — rei   (blue)


# -----------------------------------------------
# core colors
# -----------------------------------------------

background            #1a1a1a
foreground            #ffffff

# cursor
cursor                #e6122b
cursor_text_color     #1a1a1a

# selection
selection_background  #403d52
selection_foreground  #ffffff

# url underline color
url_color             #b487d5


# -----------------------------------------------
# the 16 terminal colors (color0–color15)
# -----------------------------------------------
# a quick note on what these slots mean:
#
# color0–color7   = "normal" colors (black, red, green, yellow, blue, magenta, cyan, white)
# color8–color15  = "bright" versions of the same colors
#
# programs in the terminal (ls, vim, git, etc.) use these colors
# to display syntax highlighting, file types, status messages, etc.
# -----------------------------------------------

# black (used for dark backgrounds, shadows)
color0   #1a1a1a
color8   #403d52

# red (errors, deletions, warnings)
color1   #eb6f92
color9   #e6122b

# green (success, additions, ok messages)
color2   #9ccfd8
color10  #9ccfd8

# yellow (warnings, modified, numbers)
color3   #f6c177
color11  #f6c177

# blue / valid commands (obsidian internal link color)
color4   #b487d5
color12  #81bbeb

# magenta / purple (special keywords, tags)
color5   #c4a7e7
color13  #b487d5

# cyan (secondary highlights, types)
color6   #9ccfd8
color14  #9ccfd8

# white (normal output)
color7   #ffffff
color15  #ffffff


# -----------------------------------------------
# optional: tab bar colors (if you use kitty tabs)
# -----------------------------------------------

active_tab_foreground   #1a1a1a
active_tab_background   #81bbeb
inactive_tab_foreground #908caa
inactive_tab_background #1a1a1a
tab_bar_background      #1a1a1a


# -----------------------------------------------
# optional: marks (highlight lines in terminal)
# -----------------------------------------------

mark1_foreground #1a1a1a
mark1_background #f6c177
mark2_foreground #1a1a1a
mark2_background #eb6f92
mark3_foreground #1a1a1a
mark3_background #9ccfd8
